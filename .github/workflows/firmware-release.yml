name: Firmware Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          target: esp32
          path: firmware

      - name: Merge into a single flashable image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.1
          target: esp32
          path: firmware
          command: >
            python -m esptool --chip esp32 merge_bin -o pandavent-klipper.bin
            --flash_mode dio --flash_size 4MB --flash_freq 40m
            0x1000 build/bootloader/bootloader.bin
            0x8000 build/partition_table/partition-table.bin
            0xf000 build/ota_data_initial.bin
            0x20000 build/pandavent_klipper.bin

      - name: Stage release
        run: |
          set -euo pipefail
          mkdir -p dist
          mv firmware/pandavent-klipper.bin dist/
          cd dist
          sha256sum pandavent-klipper.bin > SHA256SUMS
          ls -lh

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          cat > release_notes.md <<'NOTES'
          ## Flashing

          Install esptool:

          ```
          python -m pip install esptool
          ```

          Put the ESP32 in download mode (most USB devkits do this automatically; on bare modules, hold **BOOT** while pulsing **EN/RST**). Then flash the whole thing in one shot:

          ```
          python -m esptool --chip esp32 -p PORT -b 460800 write_flash 0x0 pandavent-klipper.bin
          ```

          Replace `PORT` with your serial device (`/dev/tty.usbserial-0001` on macOS, `/dev/ttyUSB0` on Linux, `COM3` on Windows).

          The image already includes the bootloader, partition table, OTA-data slot, and the app — nothing else to download.

          ## First boot

          The device comes up as **`Panda_Vent_XXXX`** (open WiFi hotspot, WPA2 password `987654321`, matching the stock firmware). Join it, the captive portal will pop, and you can enter your home WiFi + Moonraker printer from there. It also advertises on mDNS as **`PandaVent.local`** once it joins your LAN.

          ## Verify download

          ```
          shasum -a 256 -c SHA256SUMS
          ```
          NOTES

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
            gh release edit "$RELEASE_TAG" --notes-file release_notes.md
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" \
              --notes-file release_notes.md
          fi
